<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
    <h1>CloudWorld ☁︎</h1>
    <p>Recuperar contraseña</p>
</header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="index.html#productos">Productos</a>
        <a href="contacto.html">Contacto</a>
    </nav>
    
<div class="container mt-5">
    <form id="recuperarForm">

        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="recEmail" class="form-control">
            <div class="text-danger" style="display:none;"></div>
        </div>

        <button class="btn btn-warning" type="submit">Recuperar</button>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$("#recuperarForm").submit(function(e){
    e.preventDefault();

    if($("#recEmail").val().trim() === ""){
        $("#recEmail").next().text("Email obligatorio").show();
    } else {
        alert("Correo enviado (simulado)");
    }
});
</script>

</body>
</html>
