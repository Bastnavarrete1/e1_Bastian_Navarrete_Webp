<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CloudWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
    <h1>CloudWorld ☁︎</h1>
    <p>Iniciar sesión</p>
</header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="index.html#productos">Productos</a>
        <a href="contacto.html">Contacto</a>
    </nav>

<div class="container mt-5">
    <form id="loginForm" novalidate>
        
        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="loginEmail" class="form-control">
            <div class="text-danger" style="display:none;"></div>
        </div>

        <div class="mb-3">
            <label>Contraseña</label>
            <input type="password" id="loginPass" class="form-control">
            <div class="text-danger" style="display:none;"></div>
        </div>

        <button class="btn btn-primary" type="submit">Ingresar</button>
    </form>
</div>

<!-- Para que no quede vacio, despues integrar validaciones -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$("#loginForm").submit(function(e){
    e.preventDefault();
    let valid = true;

    $(".text-danger").hide();

    if($("#loginEmail").val().trim() === ""){
        $("#loginEmail").next().text("Email obligatorio").show();
        valid = false;
    }

    if($("#loginPass").val().trim() === ""){
        $("#loginPass").next().text("Contraseña obligatoria").show();
        valid = false;
    }

    if(valid){
        alert("Se ha iniciado sesion exitosamente");
    }
});
</script>

</body>
</html>
