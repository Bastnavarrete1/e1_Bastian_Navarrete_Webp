{% extends 'base.html' %}

{% block content %}

<h2>Editar Producto</h2>

<div class="card p-3">

    {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-primary">Guardar cambios</button>
    </form>
</div>

{% endblock %}
