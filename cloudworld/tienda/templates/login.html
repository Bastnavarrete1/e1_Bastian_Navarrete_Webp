{% extends "base.html" %}

{% block content %}

<h2>Iniciar sesion</h2>

<div class="card">

    <form method="POST">
        {% csrf_token %}

        <label>Usuario</label>
        <input type="text" name="username" required>

        <label>Contraseña</label>
        <input type="password" name="password" required>

        <button type="submit">Ingresar</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

</div>

{% endblock %}
