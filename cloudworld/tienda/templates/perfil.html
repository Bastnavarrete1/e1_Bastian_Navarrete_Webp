{% extends 'base.html' %}

{% block content %}

<h2>Mi Perfil</h2>

<div class="card">
    <p><strong>Usuario:</strong> {{ perfil.user.username }}</p>
    <p><strong>Email:</strong> {{ perfil.user.email }}</p>
    <p><strong>Teléfono:</strong> {{ perfil.telefono }}</p>
    <p><strong>Dirección:</strong> {{ perfil.direccion }}</p>

    <!-- BOTONES -->
    <a href="{% url 'editar_perfil' %}" class="btn btn-primary">
        Editar perfil
    </a>

    <form method="POST" action="{% url 'eliminar_perfil' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger"
            onclick="return confirm('¿Seguro que quieres eliminar tu cuenta?')">
            Eliminar cuenta
        </button>
    </form>
</div>

{% endblock %}
