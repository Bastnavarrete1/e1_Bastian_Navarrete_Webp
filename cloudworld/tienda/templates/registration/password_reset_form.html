{% extends "base.html" %}

{% block content %}

<h2>Recuperar contraseña</h2>

<div class="card p-3">

    <form method="POST">
        {% csrf_token %}

        {{ form.email.label_tag }}
        {{ form.email }}

        <button type="submit" class="btn btn-primary mt-3">
            Enviar enlace de recuperacion de contraseña
        </button>

    </form>

</div>

{% endblock %}
