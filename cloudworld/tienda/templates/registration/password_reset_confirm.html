{% extends "base.html" %}

{% block content %}

<h2>Nueva contraseña</h2>

<div class="card p-3">

    <form method="POST">
        {% csrf_token %}

        {{ form.new_password1.label_tag }}
        {{ form.new_password1 }}

        {{ form.new_password2.label_tag }}
        {{ form.new_password2 }}

        <button type="submit" class="btn btn-success mt-3">
            Cambiar contraseña
        </button>

    </form>

</div>

{% endblock %}
