{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Datos externos</h2>

<div class="row">

    <div class="col-md-6">
        <div class="card p-3 shadow-sm">
            <h4>Valor del dolar</h4>
            <p class="fs-5">$ {{ dolar }}</p>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card p-3 shadow-sm">
            <h4>Clima en Santiago</h4>
            <p class="fs-5">Temperatura: {{ temperatura }}°C</p>
            <p>Descripcion: {{ descripcion }}</p>
        </div>
    </div>

</div>

{% endblock %}
