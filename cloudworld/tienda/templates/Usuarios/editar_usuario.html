{% extends 'base.html' %}

{% block content %}

<h2>Editar Usuario</h2>

<div class="card p-3" style="max-width: 400px;">

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" value="{{ usuario.username }}" class="form-control">

        <label class="mt-2">Email</label>
        <input type="email" name="email" value="{{ usuario.email }}" class="form-control">

        <button type="submit" class="btn btn-primary mt-3">
            Guardar cambios
        </button>

        <a href="{% url 'lista_usuarios' %}" class="btn btn-secondary mt-3">
            Volver
        </a>

    </form>

</div>

{% endblock %}
