{% extends 'base.html' %}

{% block content %}

<h2>Eliminar Usuario</h2>

<div class="card p-3">

    <p>¿Seguro que quieres eliminar este usuario?</p>

    <p><strong>{{ usuario.username }}</strong></p>

    <form method="POST">
        {% csrf_token %}

        <button type="submit" class="btn btn-danger">
            Sí, eliminar
        </button>

        <a href="{% url 'lista_usuarios' %}" class="btn btn-secondary">
            Cancelar
        </a>
    </form>

</div>

{% endblock %}
