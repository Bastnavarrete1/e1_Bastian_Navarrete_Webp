<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - CloudWorld</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header>
    <h1>CloudWorld ☁︎</h1>
    <p>Registro de usuario</p>
</header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="index.html#productos">Productos</a>
        <a href="contacto.html">Contacto</a>
    </nav>

<div class="container mt-5">
    <form id="registroForm" novalidate>

        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" id="regNombre" class="form-control">
            <div class="text-danger" style="display:none;"></div>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="regEmail" class="form-control">
            <div class="text-danger" style="display:none;"></div>
        </div>

        <div class="mb-3">
            <label>Contraseña</label>
            <input type="password" id="regPass" class="form-control">
            <div class="text-danger" style="display:none;"></div>
        </div>

        <button class="btn btn-success" type="submit">Registrarse</button>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$("#registroForm").submit(function(e){
    e.preventDefault();
    let valid = true;

    $(".text-danger").hide();

    let pass = $("#regPass").val();

    if($("#regNombre").val().trim() === ""){
        $("#regNombre").next().text("Nombre obligatorio").show();
        valid = false;
    }

    if($("#regEmail").val().trim() === ""){
        $("#regEmail").next().text("Email obligatorio").show();
        valid = false;
    }

    // Validacion de contraseña, se que habia uno mas completo pero no recuerdo como integrarlo
    let regex = /^(?=.*[A-Z])(?=.*\d)(?=.*[\W]).{8,}$/;

    if(!regex.test(pass)){
        $("#regPass").next().text("Minino 8 caracteres (se permiten numeros, simbolos y mayusculas)").show();
        valid = false;
    }

    if(valid){
        alert("Su usuario se ha creado exitosamente");
    }
});
</script>

</body>
</html>
